name: Update OEPED Streak

on:
  push:
    paths:
      - "OneEasyProblemEveryDay/**"

permissions:
  contents: write

jobs:
  update-streak:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed OEPED files
        id: changed
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          if [ -z "$BEFORE_SHA" ] || [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git ls-files "OneEasyProblemEveryDay/**" > changed_files.txt
          else
            git diff --name-only "$BEFORE_SHA" "${{ github.sha }}" -- "OneEasyProblemEveryDay/**" > changed_files.txt
          fi

          {
            echo "changed_paths<<EOF"
            cat changed_files.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Validate layout and update streak state
        id: streak
        env:
          CHANGED_PATHS: ${{ steps.changed.outputs.changed_paths }}
        run: python3 OneEasyProblemEveryDay/verify.py --gha

      - name: Commit streak state
        if: steps.streak.outputs.has_daily_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add OneEasyProblemEveryDay/streak.json
          if git diff --cached --quiet; then
            echo "No streak changes to commit."
            exit 0
          fi
          git commit -m "chore(oeped): update streak to ${{ steps.streak.outputs.streak }}"
          git push

      - name: Print streak
        run: |
          echo "Current streak: ${{ steps.streak.outputs.streak }}"
          echo "Last completion date: ${{ steps.streak.outputs.last_date }}"
